<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Latihan 1 UI</title>
    <link rel="stylesheet" href="LATIHAN 1 .css">
</head>
<body>

    <h1>Latihan Styling UI</h1>

    <h2>Button</h2>
    <button class="btn btn-primary">Primary</button>
    <button class="btn btn-secondary">Secondary</button>
    <button class="btn btn-danger">Danger</button>
    <button class="btn btn-outline">Outline</button>

    <h2>Badge</h2>
    <span class="badge badge-blue">Info</span>
    <span class="badge badge-green">Success</span>
    <span class="badge badge-red">Error</span>

    <h2>Alert Box</h2>
    <div class="alert success">Berhasil! Data tersimpan.</div>
    <div class="alert warning">Peringatan! Cek kembali input.</div>
    <div class="alert error">Error! Terjadi kesalahan.</div>

</body>
</html>
