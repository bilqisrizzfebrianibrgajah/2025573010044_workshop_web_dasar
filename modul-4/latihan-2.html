<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>

<h2>1. Accordion / FAQ</h2>

<div class="faq">
    <details>
        <summary>Apa itu CSS Grid?</summary>
        <p>CSS Grid adalah layout system untuk membuat desain web.</p>
    </details>

    <details>
        <summary>Apa itu Flexbox?</summary>
        <p>Flexbox digunakan untuk layout satu dimensi.</p>
    </details>

    <details>
        <summary>Kenapa pakai CSS?</summary>
        <p>Untuk mempercantik tampilan website.</p>
    </details>
</div>


<h2>2. Image Hover Overlay</h2>

<div class="gallery">
    <div class="img-box"><img src="https://picsum.photos/300?1"></div>
    <div class="img-box"><img src="https://picsum.photos/300?2"></div>
    <div class="img-box"><img src="https://picsum.photos/300?3"></div>
    <div class="img-box"><img src="https://picsum.photos/300?4"></div>
</div>


<h2>3. Progress Bar</h2>

<div class="progress-container">
    <div class="progress" style="--progress: 75%">HTML</div>
    <div class="progress" style="--progress: 50%">CSS</div>
    <div class="progress" style="--progress: 90%">JavaScript</div>
</div>

</body>
