<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pinky Cloud - Landing Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Konfigurasi warna pink custom
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            pinky: {
              50: '#fdf2f8',
              400: '#f472b6',
              500: '#ec4899',
              600: '#db2777',
            }
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer components {
      .btn-pink {
        @apply px-6 py-2 bg-pinky-500 text-white rounded-full font-semibold hover:bg-pinky-600 transition-all duration-300 shadow-lg shadow-pink-200;
      }
      .card-feature {
        @apply p-8 bg-white dark:bg-gray-800 rounded-3xl border border-pinky-100 dark:border-gray-700 hover:scale-105 transition-all duration-300;
      }
    }
  </style>
</head>
<body class="bg-pinky-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 transition-colors duration-300">

  <nav class="sticky top-0 z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-pinky-100 h-16 flex items-center">
    <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center">
      <div class="text-xl font-bold text-pinky-600">PinkyCloud</div>
      <div class="flex items-center gap-4">
        <button onclick="toggleTheme()" class="p-2 bg-pinky-100 dark:bg-gray-800 rounded-full">🌓</button>
        <button class="btn-pink text-sm">Join Now</button>
      </div>
    </div>
  </nav>

  <header class="py-20 px-6 text-center">
    <h1 class="text-4xl md:text-6xl font-black mb-4">Kerja Lebih <span class="text-pinky-500 animate-pulse">Cantik.</span></h1>
    <p class="text-gray-500 mb-8 max-w-xl mx-auto">Platform manajemen tugas paling estetik untuk tim kreatif.</p>
    <div class="flex justify-center gap-3">
      <button class="btn-pink">Coba Gratis</button>
      <button class="animate-bounce">🌸</button>
    </div>
  </header>

  <section class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6 px-6 pb-20">
    <div class="card-feature"> <h3 class="font-bold">⚡ Cepat</h3> <p class="text-sm text-gray-500">Performa secepat kilat.</p> </div>
    <div class="card-feature"> <h3 class="font-bold">📱 Responsif</h3> <p class="text-sm text-gray-500">Buka di mana saja.</p> </div>
    <div class="card-feature"> <h3 class="font-bold">🎨 Estetik</h3> <p class="text-sm text-gray-500">Desain pink minimalis.</p> </div>
    <div class="card-feature"> <h3 class="font-bold">🔒 Aman</h3> <p class="text-sm text-gray-500">Data terlindungi aman.</p> </div>
    <div class="card-feature"> <h3 class="font-bold">☁️ Cloud</h3> <p class="text-sm text-gray-500">Simpan di awan.</p> </div>
    <div class="card-feature"> <h3 class="font-bold">💖 Love</h3> <p class="text-sm text-gray-500">Dibuat dengan cinta.</p> </div>
  </section>

  <script>
    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
    }
  </script>
</body>
</html>
