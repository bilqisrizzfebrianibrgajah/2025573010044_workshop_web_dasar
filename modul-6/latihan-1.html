<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalkulator Interaktif</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        padding-top: 50px;
        background-color: #f4f4f9;
      }
      .calculator {
        width: 300px;
        background: #333;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      }
      #display {
        width: 100%;
        height: 50px;
        background: #eee;
        text-align: right;
        margin-bottom: 15px;
        font-size: 1.5rem;
        padding: 10px;
        box-sizing: border-box;
        border-radius: 5px;
        overflow: hidden;
      }
      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      button {
        padding: 15px;
        font-size: 1.2rem;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        background: #555;
        color: white;
      }
      button:hover {
        background: #777;
      }
      .operator {
        background: #f39c12;
      }
      .equal {
        background: #27ae60;
        grid-column: span 2;
      }
      .clear {
        background: #c0392b;
        grid-column: span 2;
      }
    </style>
  </head>
  <body>
    <div class="calculator">
      <div id="display">0</div>
      <div class="buttons" id="btn-container">
        <button class="clear" data-type="clear" data-value="Escape">C</button>
        <button class="operator" data-type="operator" data-value="/">÷</button>
        <button class="operator" data-type="operator" data-value="*">×</button>

        <button data-type="number" data-value="7">7</button>
        <button data-type="number" data-value="8">8</button>
        <button data-type="number" data-value="9">9</button>
        <button class="operator" data-type="operator" data-value="-">-</button>

        <button data-type="number" data-value="4">4</button>
        <button data-type="number" data-value="5">5</button>
        <button data-type="number" data-value="6">6</button>
        <button class="operator" data-type="operator" data-value="+">+</button>

        <button data-type="number" data-value="1">1</button>
        <button data-type="number" data-value="2">2</button>
        <button data-type="number" data-value="3">3</button>
        <button class="equal" data-type="equal" data-value="Enter">=</button>

        <button data-type="number" data-value="0" style="grid-column: span 2">
          0
        </button>
        <button data-type="number" data-value=".">.</button>
      </div>
    </div>

    <script src="latihan-1.js"></script>
  </body>
</html>
