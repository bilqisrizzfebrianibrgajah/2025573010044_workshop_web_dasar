<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced To-Do List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-gray-100 min-h-screen py-10 px-4">
    <div
      class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6"
    >
      <h1 class="text-2xl font-bold text-center mb-6 text-gray-800">
        Daftar Tugas
      </h1>

      <div class="space-y-3 mb-6">
        <input
          type="text"
          id="todoInput"
          placeholder="Tambah tugas baru (min. 3 karakter)..."
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
        <div class="flex gap-2">
          <select
            id="priorityInput"
            class="px-4 py-2 border rounded-lg bg-white focus:outline-none"
          >
            <option value="rendah">Rendah</option>
            <option value="sedang" selected>Sedang</option>
            <option value="tinggi">Tinggi</option>
          </select>
          <button
            id="addBtn"
            class="flex-1 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition"
          >
            Tambah
          </button>
        </div>
        <p id="errorMessage" class="text-red-500 text-xs hidden italic">
          Input tidak valid!
        </p>
      </div>

      <div
        class="flex items-center justify-between mb-4 text-sm text-gray-600 border-b pb-4"
      >
        <span id="counter">0 tugas tersisa</span>
        <div class="flex gap-2">
          <button
            class="filter-btn active font-bold text-blue-600"
            data-filter="semua"
          >
            Semua
          </button>
          <button class="filter-btn" data-filter="aktif">Aktif</button>
          <button class="filter-btn" data-filter="selesai">Selesai</button>
        </div>
      </div>

      <ul id="todoList" class="space-y-2 mb-6"></ul>

      <button
        id="clearSelesai"
        class="w-full py-2 text-sm text-red-600 border border-red-600 rounded-lg hover:bg-red-50 transition"
      >
        Hapus Semua Selesai
      </button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
