<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charmed Cakes - Toko Kue Online</title>
    <style>
        body { font-family: 'Poppins', sans-serif; margin: 0; background-color: #fff5f8; color: #4a4a4a; }
        header { background: #ffb7c5; color: white; padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .main-container { display: flex; flex-direction: row; padding: 30px; gap: 30px; max-width: 1200px; margin: auto; }

        #product-list { flex: 2; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .product-card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; transition: transform 0.3s; border: 1px solid #ffe0e6; }
        .product-card:hover { transform: translateY(-5px); }
        .product-card img { width: 100%; border-radius: 10px; height: 150px; object-fit: cover; }
        .product-card h4 { margin: 15px 0 5px; color: #d63384; }
        
        #cart { flex: 1; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); align-self: flex-start; position: sticky; top: 20px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #fce4ec; padding: 12px 0; }
        .cart-controls button { background: #fce4ec; border: none; padding: 2px 10px; border-radius: 5px; cursor: pointer; color: #d63384; font-weight: bold; }
        .total-section { margin-top: 20px; font-weight: bold; font-size: 1.3rem; color: #d63384; border-top: 2px dashed #fce4ec; padding-top: 15px; display: flex; justify-content: space-between; }
        
        .badge { background: #ffffff; color: #ffb7c5; border-radius: 50%; padding: 2px 8px; font-size: 0.9rem; font-weight: bold; margin-left: 5px; }
        .btn-add { background: #ffb7c5; color: white; border: none; padding: 10px 15px; border-radius: 20px; cursor: pointer; margin-top: 10px; font-weight: bold; width: 100%; }
        .btn-add:hover { background: #ff8fa3; }
        .btn-checkout { width: 100%; background: #d63384; color: white; border: none; padding: 15px; border-radius: 30px; margin-top: 20px; cursor: pointer; font-size: 1rem; font-weight: bold; }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
        }
    </style>
</head>
<body>

<header>
    <h1 style="margin: 0; font-family: 'Brush Script MT', cursive;">Charmed Cakes ✨</h1>
    <div>🛒 Keranjang <span id="cart-badge" class="badge">0</span></div>
</header>

<div class="main-container">
    <div id="product-list"></div>

    <div id="cart">
        <h3 style="color: #d63384;">Keranjang Manis Anda</h3>
        <div id="cart-items">
            <p style="color: #bbb;">Belum ada kue yang dipilih...</p>
        </div>
        <div class="total-section">
            <span>Total:</span>
            <span>Rp <span id="cart-total">0</span></span>
        </div>
        <button class="btn-checkout" onclick="checkout()">Pesan Sekarang</button>
    </div>
</div>

<script src="latihan-2.js"></script>
</body>
</html>
