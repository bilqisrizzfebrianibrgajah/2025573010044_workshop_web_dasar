<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>from pendaftaran</title>
 </head>
 <body>

  <hi>from pendaftaran workshop</hi>
  <from action="#" method="POST">
    <div>
      <lebel for="nama">nama lengkap*</lebel><br>
      <input
      type="text"
      id="nama"
      name="nama"
      placehorder="masukan nama lengkap"
      minlenght="3"
      maxlength="100"
      required>

    </div>
    <div>
      <lebel for="email">email *</lebel><br>
      <input
      type="email"
      id="email"
      name="email"
      placehorder="contoh@gmail.com"
      required>

    </div>
    <div>
      <lebel for="pasword">pasword *</lebel><br>
      <input
      type="paswowrd"
      id="pasword"
      name="pasword"
      minlength="8"
      placehorder="minmal 8 karakter"
      required>

    </div>

    <div>
<lebel for="tanggal_lahir">tanggal lahir</lebel><br>
<input type="date" id="tanggal_lahir" name="tanggal_lahir">

    </div>

   <div>
     <p>Jenis Kelamin *</p>
     <input type="radio" id="laki" name="jenis_kelamin" value="L" required>
     <label for="laki">Laki-laki</label>
     <br>
     <input type="radio" id="perempuan" name="jenis_kelamin" value="P">
     <label for="perempuan">Perempuan</label>
   </div>

   <div>
     <label for="kelas">Pilih Kelas *</label><br>
     <select id="kelas" name="kelas" required>
     <option value="">-- Pilih kelas --</option>
     <option value="A">Kelas A (Senin-Rabu)</option>
     <option value="B">Kelas B (Selasa-Kamis)</option>
     <option value="C">Kelas C (Jumat-Sabtu)</option>
     </select>
   </div>

    <div>
     <p>Topik yang diminati:</p>
     <input type="checkbox" id="html" name="minat" value="html">
     <label for="html">HTML & CSS</label><br>
     <input type="checkbox" id="js" name="minat" value="js">
     <label for="js">JavaScript</label><br>
     <input type="checkbox" id="react" name="minat" value="react">
     <label for="react">React</label><br>
     </div>
 
    <div>
     <label for="pesan">Pertanyaan atau Pesan</label><br>
     <textarea
     id="pesan"
     name="pesan"
     rows="4"
     cols="40"
     placeholder="Tulis pertanyaanmu di sini..."></textarea>
    </div>
 
    <div>
     <button type="submit">Daftar Sekarang</button>
     <button type="reset">Reset Form</button>
    </div>

    </from>
  
 </body>
</body>
